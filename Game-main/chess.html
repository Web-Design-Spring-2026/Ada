<!DOCTYPE html>
<html>
    <head>
        <title>Interactive Chess Board</title>
        <meta charset="UTF-8">
        <style>
            .chess-board { border-spacing: 0; border-collapse: collapse; }
            .chess-board th { padding: .5em; }
            .chess-board th + th { border-bottom: 1px solid #000; }
            .chess-board th:first-child,
            .chess-board td:last-child { border-right: 1px solid #000; }
            .chess-board tr:last-child td { border-bottom: 1px solid; }
            .chess-board th:empty { border: none; }
            .chess-board td { width: 1.5em; height: 1.5em; text-align: center; font-size: 32px; line-height: 0; cursor: pointer; user-select: none; }
            .chess-board .light { background: #eee; }
            .chess-board .dark { background: #aaa; }
            
            /* New class to highlight the selected piece */
            .chess-board .selected { background: #fff59d !important; } 
        </style>
    </head>
    <body>
        <table class="chess-board">
            <tbody>
                <tr>
                    <th></th>
                    <th>a</th>
                    <th>b</th>
                    <th>c</th>
                    <th>d</th>
                    <th>e</th>
                    <th>f</th>
                    <th>g</th>
                    <th>h</th>
                </tr>
                <tr>
                    <th>8</th>
                    <td class="light">♜</td>
                    <td class="dark">♞</td>
                    <td class="light">♝</td>
                    <td class="dark">♛</td>
                    <td class="light">♚</td>
                    <td class="dark">♝</td>
                    <td class="light">♞</td>
                    <td class="dark">♜</td>
                </tr>
                <tr>
                    <th>7</th>
                    <td class="dark">♟</td>
                    <td class="light">♟</td>
                    <td class="dark">♟</td>
                    <td class="light">♟</td>
                    <td class="dark">♟</td>
                    <td class="light">♟</td>
                    <td class="dark">♟</td>
                    <td class="light">♟</td>
                </tr>
                <tr>
                    <th>6</th>
                    <td class="light"></td>
                    <td class="dark"></td>
                    <td class="light"></td>
                    <td class="dark"></td>
                    <td class="light"></td>
                    <td class="dark"></td>
                    <td class="light"></td>
                    <td class="dark"></td>
                </tr>
                <tr>
                    <th>5</th>
                    <td class="dark"></td>
                    <td class="light"></td>
                    <td class="dark"></td>
                    <td class="light"></td>
                    <td class="dark"></td>
                    <td class="light"></td>
                    <td class="dark"></td>
                    <td class="light"></td>
                </tr>
                <tr>
                    <th>4</th>
                    <td class="light"></td>
                    <td class="dark"></td>
                    <td class="light"></td>
                    <td class="dark"></td>
                    <td class="light"></td>
                    <td class="dark"></td>
                    <td class="light"></td>
                    <td class="dark"></td>
                </tr>
                <tr>
                    <th>3</th>
                    <td class="dark"></td>
                    <td class="light"></td>
                    <td class="dark"></td>
                    <td class="light"></td>
                    <td class="dark"></td>
                    <td class="light"></td>
                    <td class="dark"></td>
                    <td class="light"></td>
                </tr>
                <tr>
                    <th>2</th>
                    <td class="light">♙</td>
                    <td class="dark">♙</td>
                    <td class="light">♙</td>
                    <td class="dark">♙</td>
                    <td class="light">♙</td>
                    <td class="dark">♙</td>
                    <td class="light">♙</td>
                    <td class="dark">♙</td>
                </tr>
                <tr>
                    <th>1</th>
                    <td class="dark">♖</td>
                    <td class="light">♘</td>
                    <td class="dark">♗</td>
                    <td class="light">♕</td>
                    <td class="dark">♔</td>
                    <td class="light">♗</td>
                    <td class="dark">♘</td>
                    <td class="light">♖</td>
                </tr>
            </tbody>
        </table>

        <script>
            // 1. Set up a variable to hold our currently selected square
            let selectedSquare = null;

            // 2. Get every single table cell (td) on the board
            const squares = document.querySelectorAll(".chess-board td");

            // 3. Loop through them and add a click listener to each one
            squares.forEach(square => {
                square.addEventListener("click", function() {
                    
                    // SCENARIO A: A piece is already selected, so we are trying to move it
                    if (selectedSquare) {
                        
                        // If we click the exact same square, simply deselect it
                        if (this === selectedSquare) {
                            this.classList.remove("selected");
                            selectedSquare = null;
                        } 
                        // Otherwise, execute the move
                        else {
                            // Copy the piece (the text) to the new clicked square
                            this.innerText = selectedSquare.innerText;
                            
                            // Erase the piece from the old square
                            selectedSquare.innerText = "";
                            
                            // Remove the highlight and reset the state
                            selectedSquare.classList.remove("selected");
                            selectedSquare = null;
                        }
                    } 
                    
                    // SCENARIO B: Nothing is selected yet, so we are trying to pick up a piece
                    else {
                        // Only select it if the square actually has text (a piece) inside it
                        if (this.innerText.trim() !== "") {
                            this.classList.add("selected");
                            selectedSquare = this;
                        }
                    }
                });
            });
        </script>
    </body>
</html>
