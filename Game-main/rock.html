<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors - Larry's Redemption</title>
    <style>
        @import url('https://fonts.googleapis.com/css?family=Acme&display=swap');

        body {
            margin: 0;
            font-family: 'Acme', sans-serif;
            background: #fdfdfd;
            display: flex;
            justify-content: center;
        }

        #game-wrapper {
            text-align: center;
            padding: 40px;
            width: 100%;
            max-width: 800px;
        }

        /* --- Scoreboard: Fixed IDs --- */
        #scoreboard {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            font-size: 1.3rem;
            border: 2px solid #eee;
        }

        #reset-btn {
            margin-left: 20px;
            padding: 5px 15px;
            cursor: pointer;
            font-family: 'Acme';
            background: #ff5e5e;
            color: white;
            border: none;
            border-radius: 5px;
        }

        /* --- Hand Container --- */
        #hands-area {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 280px;
            gap: 40px;
            margin-bottom: 20px;
        }

        .hand {
            width: 200px;
            height: 200px;
            position: relative;
            transform-origin: 20% 50%; /* Pivots from the wrist */
            animation: idle 3s infinite ease-in-out;
        }

        #user-hand {
            transform: rotateY(180deg);
            transform-origin: 80% 50%;
        }

        /* Hand Graphics */
        .hand div {
            position: absolute;
            background: #FFD700;
            border: 2px solid #000;
            box-sizing: border-box;
            transition: all 0.15s;
        }

        .fist { height: 110px; width: 90px; left: 40px; top: 50px; border-radius: 20px 0 0 20px; }
        .arm { height: 60px; width: 45px; left: 0; top: 75px; border: 0 !important; border-top: 2px solid #000 !important; border-bottom: 2px solid #000 !important; }
        .thumb { height: 70px; width: 35px; left: 80px; top: 50px; border-radius: 0 20px 20px 20px; box-shadow: -17px 6px 0 -15px black; }
        .finger { height: 30px; width: 70px; left: 80px; border-radius: 20px; transform-origin: 0 50%; }
        .finger-1 { top: 50px; }
        .finger-2 { top: 78px; }
        .finger-3 { top: 106px; }
        .finger-4 { top: 134px; height: 26px; }

        /* --- THE SHAKE (Fixed Movement) --- */
        @keyframes shake {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-40px); } /* Vertical pump only */
        }

        @keyframes shakeUser {
            0%, 100% { transform: rotateY(180deg) translateY(0); }
            50% { transform: rotateY(180deg) translateY(-40px); }
        }

        .is-shaking #computer-hand { animation: shake 0.4s infinite !important; }
        .is-shaking #user-hand { animation: shakeUser 0.4s infinite !important; }

        /* Force Fist state during shake */
        .is-shaking .finger, .is-shaking .thumb {
            width: 70px !important;
            transform: none !important;
            left: 80px !important;
            border-radius: 20px !important;
        }

        @keyframes idle { 0%, 100% { transform: rotate(0); } 50% { transform: rotate(-3deg); } }

        /* --- Hand Postures --- */
        .paper .finger { width: 95px; left: 120px; border-radius: 0 20px 20px 0; }
        .scissors .finger-1 { width: 130px; transform: rotate(-15deg); }
        .scissors .finger-2 { width: 130px; transform: rotate(15deg); }

        /* --- UI Elements --- */
        #controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .btn {
            font-size: 2.5rem;
            padding: 15px;
            cursor: pointer;
            background: white;
            border: 2px solid #ddd;
            border-radius: 50%;
            transition: 0.2s;
            line-height: 1;
        }

        .btn:hover { background: #f0f0f0; transform: scale(1.1); }

        #result-display {
            margin-top: 20px;
            min-height: 80px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <h1>Rock Paper Scissors</h1>

    <div id="scoreboard">
        Player: <span id="p-score">0</span> | 
        Computer: <span id="c-score">0</span> | 
        Ties: <span id="t-score">0</span>
        <button id="reset-btn">Reset Score</button>
    </div>

    <div id="hands-area">
        <div class="hand" id="computer-hand">
            <div class="arm"></div><div class="fist"></div>
            <div class="finger finger-1"></div><div class="finger finger-2"></div>
            <div class="finger finger-3"></div><div class="finger finger-4"></div>
            <div class="thumb"></div>
        </div>

        <div class="hand" id="user-hand">
            <div class="arm"></div><div class="fist"></div>
            <div class="finger finger-1"></div><div class="finger finger-2"></div>
            <div class="finger finger-3"></div><div class="finger finger-4"></div>
            <div class="thumb"></div>
        </div>
    </div>

    <div id="controls">
        <div class="btn" onclick="playGame('rock')">✊</div>
        <div class="btn" onclick="playGame('paper')">🖐️</div>
        <div class="btn" onclick="playGame('scissors')">✌</div>
    </div>

    <div id="result-display" class="hidden">
        <h2 id="result-text"></h2>
        <button onclick="resetHands()">Next Round</button>
    </div>
</div>

<script>
    // Variables
    let score = JSON.parse(localStorage.getItem('rps_score')) || {p: 0, c: 0, t: 0};
    const wrapper = document.getElementById('game-wrapper');
    const uHand = document.getElementById('user-hand');
    const cHand = document.getElementById('computer-hand');
    const resultBox = document.getElementById('result-display');
    const controls = document.getElementById('controls');

    function updateScore() {
        document.getElementById('p-score').innerText = score.p;
        document.getElementById('c-score').innerText = score.c;
        document.getElementById('t-score').innerText = score.t;
        localStorage.setItem('rps_score', JSON.stringify(score));
    }

    function playGame(userChoice) {
        // Reset and hide UI
        resetHands();
        controls.classList.add('hidden');
        wrapper.classList.add('is-shaking');

        // Shake for 1.2 seconds
        setTimeout(() => {
            wrapper.classList.remove('is-shaking');
            
            const options = ['rock', 'paper', 'scissors'];
            const compChoice = options[Math.floor(Math.random() * 3)];

            // Show moves
            if (userChoice !== 'rock') uHand.classList.add(userChoice);
            if (compChoice !== 'rock') cHand.classList.add(compChoice);

            // Win Logic
            if (userChoice === compChoice) {
                score.t++;
                document.getElementById('result-text').innerText = "🤝 Tie Game!";
            } else if (
                (userChoice === 'rock' && compChoice === 'scissors') ||
                (userChoice === 'paper' && compChoice === 'rock') ||
                (userChoice === 'scissors' && compChoice === 'paper')
            ) {
                score.p++;
                document.getElementById('result-text').innerText = "🎉 You Win!";
            } else {
                score.c++;
                document.getElementById('result-text').innerText = "💻 Computer Wins!";
            }

            updateScore();
            resultBox.classList.remove('hidden');
        }, 1200);
    }

    function resetHands() {
        uHand.className = "hand";
        cHand.className = "hand";
        resultBox.classList.add('hidden');
        controls.classList.remove('hidden');
    }

    document.getElementById('reset-btn').onclick = () => {
        score = {p: 0, c: 0, t: 0};
        updateScore();
    };

    // Initial Load
    updateScore();
</script>

</body>
</html>
