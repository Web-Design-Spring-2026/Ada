<div>

</div>
    <script>
        let score = 0;
        let gameActive = false;
        let moleSpeed = 1000; // Starting speed (1 second)
        let lastHole;

        const scoreDisplay = document.getElementById('score');
        const speedDisplay = document.getElementById('speed-display');
        const moles = document.querySelectorAll('.mole');
        const holes = document.querySelectorAll('.hole');

        function randomHole(holes) {
            const idx = Math.floor(Math.random() * holes.length);
            const hole = holes[idx];
            if (hole === lastHole) return randomHole(holes);
            lastHole = hole;
            return hole;
        }

        function peep() {
            if (!gameActive) return;
            const hole = randomHole(holes);
            hole.classList.add('up');

            setTimeout(() => {
                hole.classList.remove('up');
                if (gameActive) peep();
            }, moleSpeed);
        }

        function whack(e) {
            if(!e.isTrusted) return; // Anti-cheat
            score++;
            this.parentNode.classList.remove('up');
            scoreDisplay.textContent = score;

            // --- THE LOGIC: Increase speed by 10% every 5 points ---
            if (score > 0 && score % 5 === 0) {
                moleSpeed *= 0.9; // Shrink the time by 10%
                let currentSpeedPct = Math.round((1000 / moleSpeed) * 100);
                speedDisplay.textContent = currentSpeedPct + "%";
            }
        }

        moles.forEach(mole => mole.addEventListener('click', whack));

        document.getElementById('start-btn').addEventListener('click', () => {
            score = 0;
            moleSpeed = 1000;
            gameActive = true;
            scoreDisplay.textContent = 0;
            speedDisplay.textContent = "100%";
            peep();
        });
      // Create an Audio Context
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    if (type === 'hit') {
        // High pitch "Thwack"
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
    } else if (type === 'miss') {
        // Low pitch "Buzz" for Bomb/Miss
        oscillator.type = 'sawtooth';
        oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.3);
        gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
    }

    oscillator.start();
    gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
    oscillator.stop(audioCtx.currentTime + 0.3);
}

// 2. Attach listeners to your inputs
document.querySelectorAll('input[id^="mole"]').forEach(input => {
    input.addEventListener('change', () => {
        if (input.checked) playSound('hit');
    });
});

document.querySelector('#bomb-hit').addEventListener('change', () => {
    playSound('miss');
});
      document.getElementById('board').addEventListener('mousedown', (e) => {
    // If the user clicks a DIV (the hole) but NOT a label (the mole)
    if (e.target.tagName === 'DIV') {
        playSound('miss');
    }
});
      // 1. Setup the Audio Context
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
    // CRITICAL: This wakes up the audio if the browser put it to sleep
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }

    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    if (type === 'hit') {
        // A sharp "Thwack" sound
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
        gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
    } else {
        // A low "Bzzzt" sound for bombs or misses
        oscillator.type = 'sawtooth';
        oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.2);
        gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
    }

    oscillator.start();
    gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);
    oscillator.stop(audioCtx.currentTime + 0.2);
}

// 2. Listen for clicks on the Labels (the moles)
// We use 'mousedown' because it triggers immediately when you click
document.addEventListener('mousedown', (e) => {
    const target = e.target;

    // Did they click a mole label?
    if (target.tagName === 'LABEL' && target.getAttribute('for').includes('mole')) {
        playSound('hit');
    } 
    // Did they click a bomb label?
    else if (target.tagName === 'LABEL' && target.getAttribute('for') === 'bomb-hit') {
        playSound('miss');
    }
    // Did they click the board (the brown dirt) but miss the mole?
    else if (target.closest('#board') && target.tagName === 'DIV') {
        playSound('miss');
    }
});
