<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Title</title>
    </head>

    <style>
        .box {

          width: 200px;
          height: 200px;
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          margin: 20px;
          display: inline-block;
        }
        /* Your current code */
        .original {
          clip-path: polygon(50% 0%, 100% 0, 100% 35%, 100% 70%, 80% 90%, 50% 100%, 20% 90%, 0% 70%, 0 0, 20% 10%);
        }

        /* Symmetrical fix */
        .symmetrical {
          clip-path: polygon(100% 0, 100% 70%, 50% 100%, 0% 70%, 0 0); /* Simplified Shield */
        }
        .shield-img {
          width: 300px;       /* Set your desired width */
          height: 300px;      /* Set your desired height */
          object-fit: cover; 
        }
        /* CRITICAL: Prevents the image from looking squished */
            .shape{
      clip-path: polygon(20% 0%, 0% 20%, 100% 51%, 0% 80%, 20% 100%, 47% 0, 80% 100%, 100% 80%, 0 50%, 100% 20%, 80% 0%, 49% 100%);
        }
    </style>
    <body>
        <img src="clown.jpg" class="shield-img" alt="My Shield Image" />

        <div class="box original"></div>

        <div class="box symmetrical"></div>
        <div class="box shape"></div>
    </body>
</html>
